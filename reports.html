<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crime Reports</title>

    <link rel="stylesheet" href="styles.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

    <div class="report-page">

        <h1>📊 Crime Analytics Report</h1>

        <div class="report-cards">

            <div class="report-card">
                <h2>1500</h2>
                <p>Total Crimes</p>
            </div>

            <div class="report-card">
                <h2>1200</h2>
                <p>Solved Cases</p>
            </div>

            <div class="report-card">
                <h2>250</h2>
                <p>Pending Cases</p>
            </div>

            <div class="report-card">
                <h2>85%</h2>
                <p>Crime Solved Rate</p>
            </div>

        </div>

        <div class="chart-box">

            <canvas id="crimeChart"></canvas>

        </div>

    </div>

    <script>

        const ctx = document.getElementById('crimeChart');

        new Chart(ctx, {

            type: 'bar',

            data: {

                labels: ['Theft', 'Robbery', 'Cyber', 'Murder', 'Fraud'],

                datasets: [{

                    label: 'Crime Cases',

                    data: [120, 80, 150, 40, 90]

                }]

            }

        });

    </script>
    <script src="app.js"></script>
</body>

</html>
