<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Crime Admin Panel</title>

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        body {
            font-family: Arial;
            background: #0b0f19;
            color: white;
            margin: 0;
        }

        .admin {
            padding: 20px;
        }

        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .admin-card {
            background: #151c2c;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            transition: 0.3s;
        }

        .admin-card:hover {
            transform: scale(1.05);
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 12px;
            background: #00d2ff;
            color: black;
            border-radius: 6px;
            text-decoration: none;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 30px;
        }

        .stat-box {
            background: #1b2436;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
    </style>
</head>

<body>

    <section class="admin">

        <h1>⚙️ AI Crime Admin Dashboard</h1>

        <!-- STATS -->
        <div class="stats">
            <div class="stat-box">
                <h2 id="totalFir">0</h2>
                <p>Total FIR</p>
            </div>

            <div class="stat-box">
                <h2>245</h2>
                <p>Police Officers</p>
            </div>

            <div class="stat-box">
                <h2>48</h2>
                <p>Wanted Criminals</p>
            </div>

            <div class="stat-box">
                <h2>325</h2>
                <p>Active Cameras</p>
            </div>
        </div>

        <!-- MODULES -->
        <div class="admin-grid">

            <div class="admin-card">
                <i class="fa-solid fa-file-circle-plus"></i>
                <h2>FIR Management</h2>
                <a href="admin-fir.html" class="btn">Open</a>
            </div>

            <div class="admin-card">
                <i class="fa-solid fa-map-location-dot"></i>
                <h2>Crime Map</h2>
                <a href="crime-map.html" class="btn">Open</a>
            </div>

            <div class="admin-card">
                <i class="fa-solid fa-users"></i>
                <h2>Officers</h2>
                <a href="officers.html" class="btn">Open</a>
            </div>

            <div class="admin-card">
                <i class="fa-solid fa-chart-line"></i>
                <h2>Analytics</h2>
                <a href="dashboard.html" class="btn">Open</a>
            </div>

        </div>

    </section>

    <!-- FIREBASE -->
    <script type="module">
        import { db, listenReports } from "./firebase.js";

        const totalFir = document.getElementById("totalFir");

        listenReports((snapshot) => {
            totalFir.innerText = snapshot.size;
        });
    </script>

</body>

</html>
