<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Live Tracking System</title>

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        #map {
            height: 400px;
            width: 100%;
            border-radius: 12px;
            margin-top: 15px;
        }
    </style>
</head>

<body>

    <section class="gps">

        <h1>📍 Live Police GPS Tracking</h1>

        <!-- MAP -->
        <div class="gps-map">
            <h2>Police Vehicle Live Location</h2>
            <div id="map"></div>
        </div>

        <!-- VEHICLES -->
        <div class="gps-cards">

            <div class="gps-card">
                <i class="fa-solid fa-car-side"></i>
                <h3>UP32 AB 1234</h3>
                <p id="loc1">Location: Tracking...</p>
                <p>Status: 🟢 Active</p>
            </div>

            <div class="gps-card">
                <i class="fa-solid fa-car-side"></i>
                <h3>UP32 CD 5678</h3>
                <p id="loc2">Location: Tracking...</p>
                <p>Status: 🟢 Active</p>
            </div>

            <div class="gps-card">
                <i class="fa-solid fa-car-side"></i>
                <h3>UP32 EF 9012</h3>
                <p>Location: Alambagh</p>
                <p>Status: 🔴 Offline</p>
            </div>

        </div>

        <!-- NEAREST STATION -->
        <div class="widget-box">
            <h3><i class="fa-solid fa-location-dot"></i> Nearest Police Station</h3>

            <button onclick="findNearestPolice()" class="btn">
                📍 Enable Location
            </button>

            <div id="nearestStation">Location Off</div>
        </div>

    </section>

    <!-- GOOGLE MAPS API -->
    <script src="https://maps.googleapis.com/maps/api/js?key=YOUR_API_KEY&callback=initMap" async defer>
    </script>

    <script src="app.js"></script>

</body>

</html>
