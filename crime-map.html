<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crime Heat Map</title>

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

    <div class="map-container">

        <h1>🗺️ Crime Heat Map</h1>

        <div class="map-box">

            <h2>Google Map Area</h2>

            <p>📍 Lucknow City Crime Heat Map</p>

            <div class="fake-map">

                <div class="red"></div>

                <div class="yellow"></div>

                <div class="green"></div>

            </div>

        </div>

        <div class="legend">

            <h3>Map Legend</h3>

            <p>🔴 High Crime Area</p>

            <p>🟡 Medium Crime Area</p>

            <p>🟢 Safe Area</p>

        </div>

    </div>
    <script src="app.js"></script>
</body>

</html>
