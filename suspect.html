<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wanted Criminals</title>

    <link rel="stylesheet" href="styles.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

    <section class="suspects">

        <h1>👮 Wanted Criminals</h1>

        <div class="suspect-container">

            <div class="suspect-card">

                <img src="images/criminal1.jpg" alt="Criminal">

                <h2>Rahul Sharma</h2>

                <p><b>Crime:</b> Robbery</p>

                <p><b>Status:</b> Wanted</p>

                <button class="btn">View Details</button>

            </div>

            <div class="suspect-card">

                <img src="images/criminal2.jpg" alt="Criminal">

                <h2>Aman Khan</h2>

                <p><b>Crime:</b> Cyber Crime</p>

                <p><b>Status:</b> Wanted</p>

                <button class="btn">View Details</button>

            </div>

            <div class="suspect-card">

                <img src="images/criminal3.jpg" alt="Criminal">

                <h2>Rakesh Yadav</h2>

                <p><b>Crime:</b> Vehicle Theft</p>

                <p><b>Status:</b> Wanted</p>

                <button class="btn">View Details</button>

            </div>

        </div>

    </section>
    <script src="app.js"></script>
</body>

</html>
