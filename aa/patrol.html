<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patrol Vehicle Tracking</title>

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>
<script src="app.js"></script>

<body>

    <section class="patrol">

        <h1>🚓 Patrol Vehicle Tracking</h1>

        <div class="vehicle-container">

            <div class="vehicle-card">

                <i class="fa-solid fa-car-side"></i>

                <h2>UP32 G 1023</h2>

                <p><b>Officer:</b> SI Rahul Verma</p>

                <p><b>Location:</b>Nagar zone,Ghaziabad</p>

                <p><b>Status:</b> 🟢 On Patrol</p>

                <button class="btn">Track Live</button>

            </div>

            <div class="vehicle-card">

                <i class="fa-solid fa-truck-pickup"></i>

                <h2>UP32 G 2045</h2>

                <p><b>Officer:</b> Inspector Amit Singh</p>

                <p><b>Location:</b> Gomti Nagar</p>

                <p><b>Status:</b> 🟡 Standby</p>

                <button class="btn">Track Live</button>

            </div>

            <div class="vehicle-card">

                <i class="fa-solid fa-car"></i>

                <h2>UP32 G 3050</h2>

                <p><b>Officer:</b> SI Neeraj Kumar</p>

                <p><b>Location:</b> Alambagh</p>

                <p><b>Status:</b> 🔴 Emergency</p>

                <button class="btn">Track Live</button>

            </div>

        </div>

    </section>

</body>

</html>
