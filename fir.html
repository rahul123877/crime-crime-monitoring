<!DOCTYPE html>
<!DOCTYPE html>
<html>

<head>
    <title>FIR System</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <h2>📁 FIR Management System</h2>

    <div class="form">
        <input type="text" id="firInput" placeholder="Enter FIR details">
        <button onclick="addFIR()">Add FIR</button>
    </div>

    <ul id="firList"></ul>

    <script src="js/fir.js"></script>

</body>

</html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIR Management</title>

    <link rel="stylesheet" href="styles.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

    <section class="fir">

        <h1>📑 FIR Management</h1>

        <div class="fir-table">

            <table>

                <tr>

                    <th>FIR No.</th>

                    <th>Name</th>

                    <th>Crime</th>

                    <th>Location</th>

                    <th>Status</th>

                    <th>Action</th>

                </tr>

                <tr>

                    <td>FIR001</td>

                    <td>Rohit Kumar</td>

                    <td>Theft</td>

                    <td>Lucknow</td>

                    <td><span class="pending">Pending</span></td>

                    <td><button class="btn">View</button></td>

                </tr>

                <tr>

                    <td>FIR002</td>

                    <td>Amit Singh</td>

                    <td>Cyber Crime</td>

                    <td>Noida</td>

                    <td><span class="progress">Investigating</span></td>

                    <td><button class="btn">View</button></td>

                </tr>

                <tr>

                    <td>FIR003</td>

                    <td>Rahul Verma</td>

                    <td>Robbery</td>

                    <td>Kanpur</td>

                    <td><span class="solved">Solved</span></td>

                    <td><button class="btn">View</button></td>

                </tr>

            </table>

        </div>

    </section>
    <script src="app.js"></script>
    <script type="module" src="js/fir.js"></script>
</body>

</html>
