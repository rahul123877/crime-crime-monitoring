<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Alerts</title>

    <link rel="stylesheet" href="styles.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

    <section class="alerts">

        <h1>🚨 Live AI Alerts</h1>

        <div class="alert danger">
            <h2>🔴 High Risk Alert</h2>
            <p>Multiple theft cases reported in Hazratganj, Lucknow.</p>
            <span>Time: 10:45 AM</span>
        </div>

        <div class="alert warning">
            <h2>🟡 Medium Risk</h2>
            <p>Cyber fraud complaints increasing in Noida.</p>
            <span>Time: 11:30 AM</span>
        </div>

        <div class="alert safe">
            <h2>🟢 Safe Zone</h2>
            <p>No major incidents reported in Prayagraj.</p>
            <span>Updated: 12:15 PM</span>
        </div>

    </section>
    <script src="app.js"></script>
</body>

</html>
