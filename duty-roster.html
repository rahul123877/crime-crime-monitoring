<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duty Roster</title>

    <link rel="stylesheet" href="styles.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

    <section class="roster">

        <h1>📅 Police Duty Roster</h1>

        <table class="roster-table">

            <tr>
                <th>Officer</th>
                <th>Rank</th>
                <th>Shift</th>
                <th>Location</th>
                <th>Status</th>
            </tr>

            <tr>
                <td>Rahul Verma</td>
                <td>SI</td>
                <td>Morning</td>
                <td>Hazratganj</td>
                <td><span class="online">🟢 On Duty</span></td>
            </tr>

            <tr>
                <td>Amit Singh</td>
                <td>Inspector</td>
                <td>Evening</td>
                <td>Gomti Nagar</td>
                <td><span class="online">🟢 On Duty</span></td>
            </tr>

            <tr>
                <td>Neeraj Kumar</td>
                <td>SI</td>
                <td>Night</td>
                <td>Alambagh</td>
                <td><span class="offline">🔴 Off Duty</span></td>
            </tr>

            <tr>
                <td>Rohit Sharma</td>
                <td>Constable</td>
                <td>Night</td>
                <td>Charbagh</td>
                <td><span class="online">🟢 On Duty</span></td>
            </tr>

        </table>

    </section>
    <script src="app.js"></script>
</body>

</html>
